  updateImpSaveBtn();
}
function removeImpCard(i){
  if(S.imp.data?.erros_e_armadilhas) S.imp.data.erros_e_armadilhas.splice(i,1);
  render();
}

function handleDrop(ev){ev.preventDefault();document.getElementById('dropZone')?.classList.remove('hover');const f=ev.dataTransfer?.files?.[0];if(f)processFile(f);}
function handleFile(ev){const f=ev.target?.files?.[0];if(f)processFile(f);}
function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    let content=e.target.result;
    if(file.name.endsWith('.html')){const tmp=document.createElement('div');tmp.innerHTML=content;content=tmp.textContent||tmp.innerText||'';}
    S.imp={...S.imp,state:'file_loaded',file,content};render();
  };
  reader.readAsText(file,'UTF-8');
}

async function runImportAI(){
  const apiKey=localStorage.getItem('vm_apikey')||'';
  if(!apiKey){S.imp.state='nokey';render();return;}
  const topicSel=document.getElementById('impTopicSel')?.value;
  if(topicSel) S.imp.selTopicId=topicSel;
  S.imp.state='loading';S.imp.errorMsg='';render();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.imp.model||'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:IMPORT_PROMPT+'\n\n---\n\nANOTAÇÕES DO ALUNO:\n\n'+S.imp.content.slice(0,25000)}]})
    });
    if(!resp.ok){const eb=await resp.text().catch(()=>'');let detail='';try{detail=JSON.parse(eb)?.error?.message||'';}catch(x){}let msg=resp.status===401?'API key inválida. Verifique em Configurações.':resp.status===429?'Limite atingido. Aguarde alguns minutos.':'Erro '+resp.status+(detail?' — '+detail:'');throw new Error(msg);}
    const data=await resp.json();
    const txt=data.content.map(b=>b.type==='text'?b.text:'').join('');
    const match=txt.match(/\{[\s\S]*\}/);if(!match) throw new Error('JSON não encontrado na resposta.');
    const parsed=JSON.parse(match[0]);
    if(!S.imp.selTopicId){const dt=(parsed.topico_detectado||'').toLowerCase();const m=S.topics.find(t=>t.nome.toLowerCase().includes(dt.slice(0,12))||dt.includes(t.nome.toLowerCase().slice(0,12)));if(m)S.imp.selTopicId=m.id;}
    S.imp={...S.imp,state:'preview',data:parsed};
  }catch(err){S.imp.state='error';S.imp.errorMsg=err.message;console.error(err);}
  render();
}

function showManualMode(){S.imp.state='manual';render();}
function copyPrompt(){
  const text=IMPORT_PROMPT+'\n\n---\n\nANOTAÇÕES DO ALUNO:\n\n'+S.imp.content.slice(0,25000);
  navigator.clipboard.writeText(text).then(()=>toast('📋 Prompt copiado! Cole no Claude.ai')).catch(()=>toast('Copie manualmente o prompt'));
}
function pasteJSONResult(){
  const val=(document.getElementById('jsonPasteArea')?.value||'').trim();
  if(!val){toast('⚠️ Cole o JSON aqui antes');return;}
  try{
    const match=val.match(/\{[\s\S]*\}/);if(!match) throw new Error('JSON não encontrado');
    const parsed=JSON.parse(match[0]);
    if(!parsed.erros_e_armadilhas) throw new Error('Estrutura inválida');
    if(!S.imp.selTopicId){const dt=(parsed.topico_detectado||'').toLowerCase();const m=S.topics.find(t=>t.nome.toLowerCase().includes(dt.slice(0,12)));if(m)S.imp.selTopicId=m.id;}
    S.imp={...S.imp,state:'preview',data:parsed};render();
  }catch(err){toast('⚠️ JSON inválido: '+err.message);}
}

function saveImportedErrors(){
  const d=S.imp.data;if(!d) return;
  const topicId=S.imp.selTopicId;
  const area=d.area_detectada||'cm';
  let topId=topicId;
  if(!topId){const custom={id:'custom_'+Date.now(),nome:d.topico_detectado||'Importado do Notion',area,band:'pendente',prevClass:'alta',custom:true};S.topics.push(custom);topId=custom.id;}
  const selected=Array.from(document.querySelectorAll('.imp-check:checked')).map(c=>parseInt(c.dataset.impIdx));
  const toSave=(d.erros_e_armadilhas||[]).filter((_,i)=>selected.includes(i));
  toSave.forEach(er=>{
    S.errors.unshift({id:'e'+Date.now()+Math.random().toString(36).slice(2),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),topicId:topId,area,titulo:er.titulo||'',prioridade:er.prioridade||'media',enunciado:'',meuErro:er.meuErro||'',deveSaber:er.deveSaber||'',flashcards:er.flashcards||[],revisado:false,fonte:'notion_import'});
  });
  saveAll();S.imp={state:'idle',file:null,content:'',data:null,selTopicId:'',model:S.imp.model,errorMsg:''};
  toast('✅ '+toSave.length+' erros importados!');nav('topic',topId);renderSidebar();updateTopStat();
}


/* ============================================================
   ALL ERRORS — CADERNO COMPLETO
============================================================ */
function renderAllErrors(){
  const f=S.allFilter;
  const total=S.errors.length;
  const fcs=S.errors.reduce((a,e)=>a+(e.flashcards?.length||0),0);

  // Filtered set
  let errs=[...S.errors].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  if(f.sort==='prioridade'){
    const ord={alta:0,media:1,baixa:2};
    errs.sort((a,b)=>(ord[a.prioridade]??3)-(ord[b.prioridade]??3)||new Date(b.createdAt)-new Date(a.createdAt));
  }
  if(f.area!=='all') errs=errs.filter(e=>(e.area||'cm')===f.area);
  if(f.prio!=='all') errs=errs.filter(e=>e.prioridade===f.prio);
  if(f.topic!=='all') errs=errs.filter(e=>e.topicId===f.topic);
  if(f.search) errs=errs.filter(e=>{const q=f.search.toLowerCase();return[e.titulo,e.meuErro,e.deveSaber,S.topics.find(t=>t.id===e.topicId)?.nome].some(s=>s?.toLowerCase().includes(q));});
  if(f.date!=='all'){
    const now=Date.now();
    const msMap={hoje:86400000,semana:7*86400000,mes:30*86400000};
    const ms=msMap[f.date]||0;
    if(ms) errs=errs.filter(e=>now-new Date(e.createdAt).getTime()<ms);
  }

  // Topic select (só temas que têm erros, filtrados pela área se selecionada)
  const topicsWithErrs=S.topics.filter(t=>{
    const hasErr=S.errors.some(e=>e.topicId===t.id);
    const matchArea=f.area==='all'||(S.errors.find(e=>e.topicId===t.id)?.area||t.area)===f.area;
    return hasErr&&matchArea;
  });
  const topicSelect=topicsWithErrs.length>0?`
    <div style="margin-bottom:8px;display:flex;gap:8px;flex-wrap:wrap">
      <select class="ed-inp" style="max-width:340px;font-size:12.5px" onchange="S.allFilter.topic=this.value;render()">
        <option value="all"${f.topic==='all'?' selected':''}>📂 Todos os temas (${topicsWithErrs.length})</option>
        ${topicsWithErrs.map(t=>{const a=AREAS[t.area]||AREAS.cm;const cnt=S.errors.filter(e=>e.topicId===t.id).length;return `<option value="${t.id}"${f.topic===t.id?' selected':''}>${a.icon} ${t.nome} (${cnt})</option>`;}).join('')}
      </select>
      <select class="ed-inp" style="max-width:200px;font-size:12.5px" onchange="S.allFilter.sort=this.value;render()">
        <option value="data"${f.sort==='data'?' selected':''}>🕐 Mais recentes</option>
        <option value="prioridade"${f.sort==='prioridade'?' selected':''}>🔴 Prioridade (Alta → Baixa)</option>
      </select>
    </div>`:'';

  // Date chips
  const dateOpts=[['all','Todos'],['hoje','Hoje'],['semana','7 dias'],['mes','30 dias']];
  const dateChips=dateOpts.map(([k,l])=>{
    const on=f.date===k;
    return `<button class="achip${on?' on':''}" style="${on?'background:var(--pink-pale);color:var(--pink);border-color:var(--pink-light)':''}" onclick="S.allFilter.date='${k}';render()">📅 ${l}</button>`;
  }).join('');

  // Area chips
  const areaChips=Object.entries(AREAS).map(([k,v])=>{
    const cnt=S.errors.filter(e=>(e.area||'cm')===k).length;
    if(!cnt) return '';
    const on=f.area===k;
    return `<button class="achip${on?' on':''}" style="${on?`background:${v.color}20;color:${v.color};border-color:${v.color}40`:''}" onclick="S.allFilter.area='${on?'all':k}';S.allFilter.topic='all';render()">${v.icon} ${v.short} <em style="font-style:normal;opacity:.7">${cnt}</em></button>`;
  }).join('');

  const prioChips=[['all','Todos'],['alta','Alta'],['media','Média'],['baixa','Baixa']].map(([k,l])=>{
    const on=f.prio===k;
    const colors={alta:'#E5484D',media:'#E5873A',baixa:'#22A85C'};
    const c=colors[k]||'var(--pink)';
    return `<button class="achip${on?' on':''}" style="${on&&k!=='all'?`background:${c}20;color:${c};border-color:${c}40`:on?'background:var(--pink-pale);color:var(--pink);border-color:var(--pink-light)':''}" onclick="S.allFilter.prio='${on?'all':k}';render()">${l}</button>`;
  }).join('');

  const filtersHTML=`
    <div class="search-bar">
      <div style="position:relative;flex:1;max-width:320px">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none">🔍</span>
        <input class="sb-inp" placeholder="Buscar em todos os erros..." value="${esc(f.search)}" oninput="S.allFilter.search=this.value;render()">
      </div>
    </div>
    <div class="area-chips" style="margin-bottom:8px">${areaChips}</div>
    <div class="area-chips" style="margin-bottom:8px">${prioChips}</div>
    <div class="area-chips" style="margin-bottom:8px">${dateChips}</div>
    ${topicSelect}`;

  const modeToggle=`
    <div class="view-mode-toggle" style="margin-bottom:18px">
      <div class="vmt${f.mode==='lista'?' active':''}" onclick="S.allFilter.mode='lista';render()">📋 Lista</div>
      <div class="vmt${f.mode==='leitura'?' active':''}" onclick="S.allFilter.mode='leitura';render()">📖 Modo Leitura</div>
    </div>`;

  if(total===0){
    return `<div class="view"><div style="margin-bottom:20px"><div class="section-title" style="font-size:24px;font-weight:900">Caderno Completo</div></div><div class="empty"><div class="empty-ico">📓</div><div class="empty-title">Caderno vazio</div><div class="empty-sub">Adicione seus primeiros erros ou importe do Notion.</div><button class="btn btn-pink" onclick="nav('import')">✨ Importar do Notion</button></div></div>`;
  }

  let bodyHTML='';

  if(f.mode==='lista'){
    const rows=errs.length===0
      ?'<div class="no-res">Nenhum resultado para esses filtros.</div>'
      :`${S.selectMode?renderSelBar(errs.map(e=>e.id)):''}<div class="errs-wrap">${errs.map(e=>renderErow(e)).join('')}</div>`;
    bodyHTML=rows;
  } else {
    // STUDY / READING MODE — Area dividers + Topic "cadernos"
    if(errs.length===0){bodyHTML='<div class="no-res">Nenhum resultado para esses filtros.</div>';}
    else{
      const byArea={};
      errs.forEach(e=>{const a=e.area||'cm';if(!byArea[a])byArea[a]=[];byArea[a].push(e);});
      bodyHTML=`<div class="study-doc">`;
      Object.entries(byArea).forEach(([aKey,aErrs])=>{
        const a=AREAS[aKey]||AREAS.cm;
        const byTopic={};
        aErrs.forEach(e=>{const tid=e.topicId||'__sem_tema';if(!byTopic[tid])byTopic[tid]=[];byTopic[tid].push(e);});
        const topicCount=Object.keys(byTopic).length;

        bodyHTML+=`
          <div class="study-area-div">
            <div class="study-area-div-line" style="background:${a.color}"></div>
            <div class="study-area-div-label" style="background:linear-gradient(135deg,${a.color},${a.color}cc)">
              ${a.icon} ${a.label}
              <span class="study-area-div-count">· ${topicCount} tema${topicCount!==1?'s':''} · ${aErrs.length} erro${aErrs.length!==1?'s':''}</span>
            </div>
            <div class="study-area-div-line" style="background:${a.color}"></div>
          </div>`;

        const gradMap={cm:'linear-gradient(135deg,#F5E3C0,#E8C070,#D4943A)',cg:'linear-gradient(135deg,#C5D3F5,#88A8F0,#4A7CE5)',go:'linear-gradient(135deg,135deg,#FAC5D3,#EFA3B8,#E8537A)',ped:'linear-gradient(135deg,#D4C5FA,#B09EF0,#8B5CF6)',mp:'linear-gradient(135deg,#B5EDD0,#70D4A5,#22A85C)',esp:'linear-gradient(135deg,#F9DDB5,#F0B855,#E5873A)'};

        Object.entries(byTopic).forEach(([tid,tErrs])=>{
          const t=S.topics.find(x=>x.id===tid)||{nome:'Sem tema',area:aKey};
          const tFcs=tErrs.reduce((acc,e)=>acc+(e.flashcards||[]).length,0);
          const tRev=tErrs.filter(e=>e.revisado).length;
          const grad=gradMap[aKey]||gradMap.cm;

          const errorItems=tErrs.map((e,idx)=>{
            const p=PRIO[e.prioridade]||PRIO.media;
            const fcsHTML=(e.flashcards||[]).length===0?'':`
              <div class="study-field">
                <div class="study-field-lbl sfl-blu">🔄 Flashcards</div>
                <div class="study-fcs">${(e.flashcards||[]).map(fc=>`<div class="study-fc"><div class="study-fc-q">${esc(fc.p)}</div><div class="study-fc-a">${esc(fc.r)}</div></div>`).join('')}</div>
              </div>`;
            const revBtnStyle=e.revisado?'border-color:var(--green);background:rgba(34,168,92,.1);color:var(--green)':'border-color:var(--sep);background:var(--card2);color:var(--t3)';
            return `<div class="study-error" id="se_${e.id}" style="${e.revisado?'opacity:.7':''}">
              <div class="study-error-num">#${idx+1}</div>
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:4px">
                <div class="study-error-titulo">${esc(e.titulo||'Sem título')}</div>
                <div style="display:flex;gap:6px;flex-shrink:0">
                  <button style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1.5px solid;${revBtnStyle};cursor:pointer;font-family:Inter,sans-serif;transition:all .15s" id="sbtn_${e.id}" onclick="studyToggleRev('${e.id}')">${e.revisado?'✓ Revisado':'Marcar revisado'}</button>
                  <button style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;border:1.5px solid var(--sep);background:var(--card2);color:var(--t3);cursor:pointer;font-family:Inter,sans-serif" id="spbtn_${e.id}" onclick="studyChangePrio('${e.id}')">⚡ ${p.label}</button>
                </div>
              </div>
              <div class="study-badges" style="margin-bottom:10px">
                <span class="erow-badge bp-${e.prioridade}" id="sprio_${e.id}">${p.label}</span>
                <span id="srev_badge_${e.id}" class="erow-badge" style="${e.revisado?'background:rgba(34,168,92,.1);color:var(--green)':''}">${e.revisado?'✓ Revisado':''}</span>
              </div>
              ${e.meuErro?`<div class="study-field"><div class="study-field-lbl sfl-red">❌ Armadilha de Prova</div><div class="study-field-text">${esc(e.meuErro)}</div></div>`:''}
              ${e.deveSaber?`<div class="study-field"><div class="study-field-lbl sfl-grn">✅ O Que Devo Saber</div><div class="study-field-text">${esc(e.deveSaber)}</div></div>`:''}
              ${fcsHTML}
            </div>`;
          }).join('');

          bodyHTML+=`
            <div class="study-book">
              <div class="study-book-cover" style="background:${grad}">
                <div class="sbc-blob"></div>
                <div class="sbc-area-tag">${a.icon} ${a.label}</div>
                <div class="sbc-title">${esc(t.nome)}</div>
                <div class="sbc-meta">
                  <span class="sbc-stat">${tErrs.length} erro${tErrs.length!==1?'s':''}</span>
                  ${tFcs>0?`<span class="sbc-stat">🔄 ${tFcs} fc</span>`:''}
                  ${tRev>0?`<span class="sbc-stat">✓ ${tRev} rev.</span>`:''}
                  ${t.acerto?`<span class="sbc-stat">${t.acerto}% acerto hist.</span>`:''}
                </div>
              </div>
              <div class="study-book-body">${errorItems}</div>
              <div class="study-book-footer">
                <div class="sbf-info">${a.icon} ${a.label} · <strong>${esc(t.nome)}</strong></div>
                <button class="btn-mark-done" style="font-size:12px;padding:8px 16px" onclick="completeRevSession('leitura','${tid}','${aKey}')">✅ Marcar como feito</button>
              </div>
            </div>`;
        });
      });
      bodyHTML+=`</div>`;
    }
  }

  return `<div class="view">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
      <div>
        <div class="section-title" style="font-size:24px;font-weight:900">Caderno Completo</div>
        <div style="font-size:13px;color:var(--t2);margin-top:3px">${total} erro${total!==1?'s':''} · ${fcs} flashcard${fcs!==1?'s':''} · ${errs.length} exibido${errs.length!==1?'s':''}</div>
      </div>
      ${f.mode==='lista'&&errs.length>0&&!S.selectMode?`<button class="btn-cancel-sel" onclick="enterSelectMode()" style="color:var(--red);border-color:rgba(229,72,77,.3);align-self:center">☑ Selecionar para apagar</button>`:''}
      ${S.selectMode?`<button class="btn-cancel-sel" onclick="exitSelectMode()" style="align-self:center">✕ Cancelar seleção</button>`:''}
    </div>
    ${modeToggle}
    ${filtersHTML}
    ${bodyHTML}
  </div>`;
}

/* ============================================================
   REVISION
============================================================ */
function renderRevision(){
  const r=S.rev;

  // ── COMPLETION ──
  if(r.completed){
    const wrongCnt=r.totalCards-r.correct-(r.unsureCnt||0);
    const totalRounds=r.round;
    const isPerfect=r.correct===r.totalCards&&totalRounds===1;
    const hardest=Object.values(r.wrongStats||{}).sort((a,b)=>b.count-a.count).slice(0,8);
    const hardestHTML=hardest.length===0?'':('<div class="rev-hardest"><div class="rev-hardest-title">📌 Mais difíceis desta sessão</div><div class="rev-hardest-sub">Acumulados no histórico. Aparecem na aba Difíceis.</div>'
      +hardest.map(s=>{
        const a=AREAS[s.area]||AREAS.cm;
        return '<div class="rev-hard-card">'
          +'<div class="rev-hard-top">'
          +'<span class="rev-hard-count">×'+Math.round(s.count)+' erro'+(s.count>1?'s':'')+'</span>'
          +'<span class="rev-hard-area" style="background:'+a.color+'20;color:'+a.color+'">'+a.icon+' '+a.short+'</span>'
          +'<span class="rev-hard-titulo">'+esc(s.titulo)+'</span>'
          +'</div>'
          +'<div class="rev-hard-q">'+esc(s.p)+'</div>'
          +'<div class="rev-hard-a">'+esc(s.r)+'</div>'
          +'</div>';
      }).join('')
      +'</div>');
    return `<div class="view">
      <div class="rev-completion">
        <div class="rev-comp-ico">${isPerfect?'🏆':totalRounds<=2?'🎯':'💪'}</div>
        <div class="rev-comp-title">${isPerfect?'Perfeito!':totalRounds<=2?'Sessão Concluída!':'Persistência recompensada!'}</div>
        <div class="rev-comp-sub">${isPerfect?'Acertou tudo na primeira tentativa!':'Dominou todos os cards após '+totalRounds+' rodada'+(totalRounds!==1?'s':'')+'.'}</div>
        <div class="rev-comp-stats">
          <div class="rev-comp-stat"><div class="rev-comp-val" style="color:var(--green)">${r.correct}</div><div class="rev-comp-lbl">Acertei</div></div>
          <div class="rev-comp-stat"><div class="rev-comp-val" style="color:var(--gold)">${r.unsureCnt||0}</div><div class="rev-comp-lbl">Inseguro</div></div>
          <div class="rev-comp-stat"><div class="rev-comp-val" style="color:var(--red)">${wrongCnt}</div><div class="rev-comp-lbl">Errei</div></div>
          <div class="rev-comp-stat"><div class="rev-comp-val">${r.totalCards}</div><div class="rev-comp-lbl">Total</div></div>
          <div class="rev-comp-stat"><div class="rev-comp-val">${totalRounds}</div><div class="rev-comp-lbl">Rodadas</div></div>
        </div>
        <div class="rev-comp-actions">
          <button class="btn-mark-done" onclick="completeRevSession(S.rev.dailyMode?'daily':'flashcard')">✅ Marcar revisão como feita</button>
          <button class="btn-cancel" style="text-align:center" onclick="startRevAgain()">🔄 Revisar de novo</button>
          <button class="btn-cancel" style="text-align:center" onclick="stopRev()">← Voltar</button>
        </div>
        ${hardestHTML}
      </div>
    </div>`;
  }

  // ── ACTIVE SESSION ──
  if(r.active){
    const cur=r.pool[r.idx]; if(!cur){finishRev();return renderRevision();}
    const pct=Math.round((r.idx/r.pool.length)*100);
    const ai=AREAS[cur.area]||AREAS.cm;
    const t=S.topics.find(x=>x.id===cur.topicId)||{nome:'Geral'};
    const isRound2=r.round>1;
    const dailyLabel=r.dailyMode?'<span style="font-size:11px;font-weight:700;color:var(--red);background:rgba(229,72,77,.1);padding:2px 10px;border-radius:100px;margin-left:8px">🔥 Diária</span>':'';
    return `<div class="view">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div class="section-title" style="font-size:22px;font-weight:900">Revisão${dailyLabel}</div>
          ${r.round>1?`<div class="rev-round-info">🔁 Rodada ${r.round} — dominando os ${r.pool.length} cards errados</div>`:''}
        </div>
        <button class="btn btn-outline btn-sm" onclick="stopRev()">✕ Encerrar</button>
      </div>
      <div class="rev-wrap">
        <div class="fc-prog"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
        <div class="fc-counter">${r.idx+1} / ${r.pool.length}${r.wrong.length>0?` · <span style="color:var(--orange)">⚠️ ${r.wrong.length} para revisar</span>`:''}</div>
        <div class="fc-ctx">
          <span style="background:${ai.color}20;padding:2px 8px;border-radius:100px;font-size:11.5px;font-weight:700;color:${ai.color}">${ai.icon} ${ai.short}</span>
          <strong style="margin-left:4px">${esc(t.nome)}</strong>
          ${cur.overdue&&cur.srsStreak===0?'<span style="font-size:10.5px;font-weight:700;color:var(--t3);margin-left:6px">novo</span>':cur.overdue?'<span style="font-size:10.5px;font-weight:700;color:var(--red);margin-left:6px">🔴 vencido</span>':'<span style="font-size:10.5px;font-weight:700;color:var(--green);margin-left:6px">🟢 streak '+cur.srsStreak+'</span>'}
        </div>
        <div class="fc-card" onclick="flipCard()">
          ${!r.flipped
            ?`<div class="fc-lbl">Pergunta${isRound2?' (2ª tentativa)':''}</div><div class="fc-q">${esc(cur.p)}</div><div class="fc-hint">Toque para revelar →</div>`
            :`<div class="fc-lbl" style="color:var(--pink)">Resposta</div><div class="fc-a">${esc(cur.r)}</div>`}
        </div>
        <div class="fc-actions">
          ${r.flipped
            ?`<button class="fc-btn-err" onclick="markCard('wrong')">❌ Errei</button><button class="fc-btn-unc" onclick="markCard('unsure')">🟡 Inseguro</button><button class="fc-btn-ok" onclick="markCard('right')">✅ Acertei</button>`
            :`<button class="fc-reveal" onclick="flipCard()">Revelar resposta</button>`}
        </div>
      </div>
    </div>`;
  }

  // ── SETUP / DIFÍCEIS sub-tabs ──
  const subView=S.revSubView||'setup';
  const allStats=Object.values(S.cardStats||{}).filter(c=>c.wrongCount>0);
  const difCount=allStats.length;
  const subTabsHTML=`<div class="rev-subtabs">
    <button class="rev-stab${subView==='setup'?' active':''}" onclick="S.revSubView='setup';render()">🔄 Revisão</button>
    <button class="rev-stab${subView==='difficult'?' active':''}" onclick="S.revSubView='difficult';render()">🔥 Difíceis${difCount>0?'<span class="cnt">'+difCount+'</span>':''}</button>
  </div>`;

  if(subView==='difficult'){
    return `<div class="view">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
        <div><div class="section-title" style="font-size:24px;font-weight:900">Cards Difíceis</div>
        <div style="font-size:13px;color:var(--t2);margin-top:3px">Histórico de todas as sessões · ${difCount} card${difCount!==1?'s':''} com erros</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${difCount>0?`<button class="daily-banner-btn" onclick="startDailyRev()">🔥 Revisar os mais difíceis</button>`:''}
          ${difCount>0?`<button class="daily-banner-btn" style="background:linear-gradient(135deg,#4A7CE5,#2B5EC9)" onclick="exportDifficultPDF()">📄 Exportar PDF</button>`:''}
        </div>
      </div>
      ${subTabsHTML}
      ${renderDifficultCards()}
    </div>`;
  }

  // ── SETUP ──
  const topicsWithFcs=S.topics.filter(t=>{
    const aOk=r.aFilter==='all'||(t.area===r.aFilter);
    if(!aOk) return false;
    return S.errors.some(e=>e.topicId===t.id&&(e.flashcards||[]).length>0);
  });
  const topicOpts=[`<option value="all">Todos os temas</option>`,...topicsWithFcs.map(t=>{const a=AREAS[t.area]||AREAS.cm;return `<option value="${t.id}"${r.topicFilter===t.id?' selected':''}>${a.icon} ${t.nome}</option>`;})].join('');
  const aOpts=[{k:'all',l:'Todas as áreas'},...Object.entries(AREAS).map(([k,v])=>({k,l:`${v.icon} ${v.label}`}))];
  const sel=aOpts.map(o=>`<option value="${o.k}"${r.aFilter===o.k?' selected':''}>${o.l}</option>`).join('');
  const pool=buildPool(r.aFilter,r.topicFilter);
  const dailyPool=buildDailyPool(20);
  const todayKey=new Date().toISOString().slice(0,10);
  const dailyDoneToday=S.revSessions.some(s=>s.type==='daily'&&s.date&&s.date.slice(0,10)===todayKey);
  const dailyBanner=dailyPool.length>0
    ?(dailyDoneToday
      ?`<div class="daily-done-banner">✅ Revisão diária concluída hoje! ${dailyPool.length} cards mais difíceis revisados.</div>`
      :`<div class="daily-banner"><div class="daily-banner-ico">🔥</div><div class="daily-banner-body"><div class="daily-banner-title">Revisão Diária — ${dailyPool.length} cards ainda em risco</div><div class="daily-banner-sub">Os que você mais erra e ainda não dominou. Some da lista depois de 3 acertos seguidos.</div></div><button class="daily-banner-btn" onclick="startDailyRev()">Iniciar agora →</button></div>`)
    :'';
  return `<div class="view">
    <div style="margin-bottom:20px"><div class="section-title" style="font-size:24px;font-weight:900">Revisão</div><div style="font-size:13px;color:var(--t2);margin-top:3px">Aprendizagem ativa — cards errados vão para o final</div></div>
    ${subTabsHTML}
    ${dailyBanner}
    <div style="max-width:460px">
      <div class="settings-card">
        <div class="ed-lbl" style="margin-bottom:5px">Área</div>
        <select class="ed-inp" style="margin-bottom:12px" onchange="S.rev.aFilter=this.value;S.rev.topicFilter='all';render()">${sel}</select>
        <div class="ed-lbl" style="margin-bottom:5px">Tema específico</div>
        <select class="ed-inp" style="margin-bottom:14px" onchange="S.rev.topicFilter=this.value;render()">${topicOpts}</select>
        <div style="font-size:12.5px;color:var(--t3);margin-bottom:10px">${pool.length} flashcard${pool.length!==1?'s':''} disponíveis</div>
        ${(()=>{const due=countDueCards(r.aFilter,r.topicFilter);return due>0?`<div style="font-size:12px;font-weight:700;color:var(--red);background:rgba(229,72,77,.07);border:1px solid rgba(229,72,77,.18);border-radius:8px;padding:6px 12px;margin-bottom:12px">🔴 ${due} card${due!==1?'s':''} vencido${due!==1?'s':''} hoje — aparecem primeiro</div>`:''})()}
        ${pool.length===0
          ?`<div class="empty" style="padding:20px 0"><div class="empty-ico">🃏</div><div class="empty-title">Sem flashcards</div><div class="empty-sub">Adicione flashcards aos erros para revisar.</div></div>`
          :`<button class="btn btn-pink" style="width:100%" onclick="startRev()">🔄 Iniciar Revisão</button>`}
      </div>
      ${S.revSessions.length>0?`<div class="settings-card" style="margin-top:0"><div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:4px">Suas revisões</div><div style="font-size:22px;font-weight:900;color:var(--green)">${S.revSessions.length} <span style="font-size:13px;font-weight:600;color:var(--t3)">sessões completas</span></div></div>`:''}
    </div>
  </div>`;
}

function renderDifficultCards(){
  const allStats=Object.values(S.cardStats||{}).filter(c=>c.wrongCount>0);
  if(!allStats.length) return '<div class="dif-empty"><div class="dif-empty-ico">🎯</div><div class="dif-empty-title">Nenhum card difícil ainda</div><div style="font-size:12.5px">Conforme você revisar, os cards que errar mais aparecem aqui.</div></div>';
  const topicIds=[...new Set(allStats.map(c=>c.topicId).filter(Boolean))];
  const curTab=S.difficultTab||'all';
  const topicTabsHTML='<div class="dif-topic-tabs">'
    +'<button class="dif-ttab'+(curTab==='all'?' active':'')+'" onclick="S.difficultTab=&quot;all&quot;;render()">Todos ('+allStats.length+')</button>'
    +topicIds.map(tid=>{
      const t=S.topics.find(x=>x.id===tid)||{nome:'Geral',area:'cm'};
      const cnt=allStats.filter(c=>c.topicId===tid).length;
      const a=AREAS[t.area]||AREAS.cm;
      return '<button class="dif-ttab'+(curTab===tid?' active':'')+'" onclick="S.difficultTab=&quot;'+tid+'&quot;;render()">'+a.icon+' '+(t.nome.length>20?t.nome.slice(0,20)+'…':t.nome)+' ('+cnt+')</button>';
    }).join('')
    +'</div>';
  const filtered=curTab==='all'?allStats:allStats.filter(c=>c.topicId===curTab);
  const sorted=filtered.slice().sort((a,b)=>b.wrongCount-a.wrongCount);
  const cardsHTML=sorted.map((c,i)=>{
    const a=AREAS[c.area]||AREAS.cm;
    const t=S.topics.find(x=>x.id===c.topicId)||{nome:'Geral'};
    const isTop=i<3&&c.wrongCount>=2;
    const lastDate=c.lastWrong?new Date(c.lastWrong).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):'';
    const unsurePart=c.unsureCount&&c.unsureCount>0?' · 🟡 '+c.unsureCount+' inseguro'+(c.unsureCount!==1?'s':''):'';
    return '<div class="dif-card">'
      +'<div class="dif-card-top">'
      +'<span class="dif-rank'+(isTop?' top':'')+'">&#35;'+(i+1)+'</span>'
      +'<span class="dif-count">×'+Math.round(c.wrongCount)+' erro'+(c.wrongCount>1?'s':'')+'</span>'
      +'<span class="dif-area-tag" style="background:'+a.color+'20;color:'+a.color+'">'+a.icon+' '+a.short+'</span>'
      +'<span class="dif-titulo">'+esc(c.titulo)+'</span>'
      +'</div>'
      +'<div class="dif-q">'+esc(c.p)+'</div>'
      +'<div class="dif-a">'+esc(c.r)+'</div>'
      +(()=>{
        const stat=S.cardStats[c.p];
        const streakPart=stat?.srsStreak>0?(' · 🟢 streak '+stat.srsStreak):'';
        const duePart=stat?.dueDate?(()=>{const d=new Date(stat.dueDate);const now=new Date();const diff=Math.round((d-now)/86400000);return diff<=0?' · 🔴 vencido':' · vence em '+diff+'d';})():'';
        return lastDate||stat?'<div class="dif-last">'+(lastDate?'Último erro: '+lastDate:'')+unsurePart+streakPart+duePart+' · '+esc(t.nome)+'</div>':'';
      })()
      +'</div>';
  }).join('');
  return topicTabsHTML+cardsHTML;
}

const DAILY_MASTERY_STREAK=3; // 3 acertos seguidos = já tá no intervalo de 14+ dias, sai da revisão diária
function buildDailyPool(n){
  const now=Date.now();
  const candidates=Object.values(S.cardStats||{}).filter(c=>{
    if(!(c.wrongCount>0)) return false; // só entra quem já errou alguma vez
    const dueDate=c.dueDate?new Date(c.dueDate).getTime():0;
    const overdue=!c.dueDate||dueDate<=now;
    const mastered=(c.srsStreak||0)>=DAILY_MASTERY_STREAK && !overdue;
    return !mastered; // dominado e ainda dentro do prazo -> não precisa hoje
  });
  if(!candidates.length) return [];
  return candidates.slice().sort((a,b)=>{
    const aDue=a.dueDate?new Date(a.dueDate).getTime():0;
    const bDue=b.dueDate?new Date(b.dueDate).getTime():0;
    const aOverdue=!a.dueDate||aDue<=now;
    const bOverdue=!b.dueDate||bDue<=now;
    if(aOverdue&&!bOverdue) return -1;
    if(!aOverdue&&bOverdue) return 1;
    const streakDiff=(a.srsStreak||0)-(b.srsStreak||0); // streak menor (mais fraco) primeiro
    if(streakDiff!==0) return streakDiff;
    return b.wrongCount-a.wrongCount; // desempate: quem mais errou no histórico
  }).slice(0,n)
    .map(c=>{
      const dueDate=c.dueDate?new Date(c.dueDate).getTime():0;
      return {p:c.p,r:c.r,area:c.area||'cm',titulo:c.titulo||'',topicId:c.topicId||'',overdue:!c.dueDate||dueDate<=now,dueDate,srsStreak:c.srsStreak||0};
    });
}

function startDailyRev(){
  const pool=shuffle(buildDailyPool(20));
  if(!pool.length){
    const hasAnyWrong=Object.values(S.cardStats||{}).some(c=>c.wrongCount>0);
    toast(hasAnyWrong?'🏆 Tudo dominado por enquanto! Nenhum card difícil pendente hoje.':'📭 Nenhum card difícil ainda — comece revisando!');
    return;
  }
  S.rev={...S.rev,active:true,completed:false,pool,idx:0,flipped:false,wrong:[],round:1,correct:0,unsureCnt:0,wrongCnt:0,totalCards:pool.length,wrongStats:{},dailyMode:true};
  S.revSubView='setup';
  render();
}

function buildPool(aFilter,topicFilter){
  const pool=[];
  const now=Date.now();
  S.errors.filter(e=>{
    const aOk=aFilter==='all'||e.area===aFilter;
    const tOk=topicFilter==='all'||e.topicId===topicFilter;
    return aOk&&tOk;
  }).forEach(e=>(e.flashcards||[]).forEach(f=>{
    const stat=S.cardStats[f.p];
    const dueDate=stat?.dueDate?new Date(stat.dueDate).getTime():0;
    const overdue=!stat?.dueDate||dueDate<=now; // never seen or due
    pool.push({...f,titulo:e.titulo||'',area:e.area||'cm',topicId:e.topicId,overdue,dueDate,srsStreak:stat?.srsStreak||0});
  }));
  // Sort: overdue first (by wrongCount desc), then not-due (by dueDate asc)
  pool.sort((a,b)=>{
    if(a.overdue&&!b.overdue) return -1;
    if(!a.overdue&&b.overdue) return 1;
    if(a.overdue&&b.overdue){
      const wa=S.cardStats[a.p]?.wrongCount||0;
      const wb=S.cardStats[b.p]?.wrongCount||0;
      return wb-wa;
    }
    return a.dueDate-b.dueDate;
  });
  return pool;
}
function countDueCards(aFilter,topicFilter){
  const now=Date.now();
  let cnt=0;
  S.errors.filter(e=>{
    const aOk=aFilter==='all'||e.area===aFilter;
    const tOk=topicFilter==='all'||e.topicId===topicFilter;
    return aOk&&tOk;
  }).forEach(e=>(e.flashcards||[]).forEach(f=>{
    const stat=S.cardStats[f.p];
    if(!stat?.dueDate||new Date(stat.dueDate).getTime()<=now) cnt++;
  }));
  return cnt;
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function startRev(){
  const pool=shuffle(buildPool(S.rev.aFilter,S.rev.topicFilter));
  if(!pool.length){toast('📭 Sem flashcards para esses filtros');return;}
  S.rev={...S.rev,active:true,completed:false,pool,idx:0,flipped:false,wrong:[],round:1,correct:0,unsureCnt:0,wrongCnt:0,totalCards:pool.length,wrongStats:{},dailyMode:false};
  render();
}
function startRevTopic(tid){
  const area=S.topics.find(t=>t.id===tid)?.area||'all';
  S.rev.aFilter='all';S.rev.topicFilter=tid;
  const pool=shuffle(buildPool('all',tid));
  if(!pool.length){toast('📭 Sem flashcards nesse tema');return;}
  S.rev={...S.rev,active:true,completed:false,pool,idx:0,flipped:false,wrong:[],round:1,correct:0,unsureCnt:0,wrongCnt:0,totalCards:pool.length,wrongStats:{},dailyMode:false};
  nav('revision');
}
function startRevAgain(){
  const pool=shuffle(buildPool(S.rev.aFilter,S.rev.topicFilter));
  S.rev={...S.rev,active:true,completed:false,pool,idx:0,flipped:false,wrong:[],round:1,correct:0,unsureCnt:0,wrongCnt:0,totalCards:pool.length,wrongStats:{},dailyMode:false};
  render();
}
function stopRev(){S.rev={...S.rev,active:false,completed:false,pool:[],idx:0,flipped:false,wrong:[],round:1};render();}
function finishRev(){
  if(S.rev.wrong.length>0){
    // Any wrong cards → start new round (no limit)
    const pool=shuffle([...S.rev.wrong]);
    const nextRound=S.rev.round+1;
    S.rev={...S.rev,pool,idx:0,flipped:false,wrong:[],round:nextRound};
    toast('🔁 Rodada '+nextRound+' — '+pool.length+' card'+(pool.length!==1?'s':'')+' para dominar!');
  } else {
    // All correct → completion
    S.rev={...S.rev,active:false,completed:true};
  }
  render();
}
function flipCard(){S.rev.flipped=!S.rev.flipped;render();}
const SRS_INTERVALS=[1,3,7,14,30]; // days per streak level
function srsNextDue(streak){
  const days=SRS_INTERVALS[Math.min(streak,SRS_INTERVALS.length-1)];
  return new Date(Date.now()+days*86400000).toISOString();
}
function markCard(result){
  // 'right' | 'unsure' | 'wrong'
  const cur=S.rev.pool[S.rev.idx];
  const key=cur.p;

  if(!S.cardStats) S.cardStats={};
  if(!S.cardStats[key]) S.cardStats[key]={p:cur.p,r:cur.r,area:cur.area||'cm',titulo:cur.titulo||'',topicId:cur.topicId||'',wrongCount:0,unsureCount:0,lastWrong:null,srsStreak:0,dueDate:null};
  const stat=S.cardStats[key];

  if(result==='right'){
    S.rev.correct++;
    // SRS: advance streak, set next due date
    stat.srsStreak=(stat.srsStreak||0)+1;
    stat.dueDate=srsNextDue(stat.srsStreak);
  } else {
    if(result==='unsure') S.rev.unsureCnt=(S.rev.unsureCnt||0)+1;
    else S.rev.wrongCnt=(S.rev.wrongCnt||0)+1;
    // Session stats
    if(!S.rev.wrongStats) S.rev.wrongStats={};
    if(!S.rev.wrongStats[key]) S.rev.wrongStats[key]={count:0,p:cur.p,r:cur.r,area:cur.area||'cm',titulo:cur.titulo||'',topicId:cur.topicId};
    S.rev.wrongStats[key].count+=(result==='wrong'?1:0.5);
    S.rev.wrong.push(cur);
    // Persistent cardStats
    if(result==='wrong'){
      stat.wrongCount++;
      stat.srsStreak=0; // reset streak on wrong
      stat.dueDate=srsNextDue(0); // due tomorrow
    } else {
      stat.unsureCount=(stat.unsureCount||0)+1;
      stat.wrongCount+=0.5;
      // unsure: don't reset streak fully, but reschedule sooner
      stat.dueDate=srsNextDue(Math.max(0,(stat.srsStreak||0)-1));
    }
    stat.lastWrong=new Date().toISOString();
  }
  stat.r=cur.r;
  stat.titulo=cur.titulo||stat.titulo;
  stat.area=cur.area||stat.area;
  stat.topicId=cur.topicId||stat.topicId;
  saveAll();

  if(S.rev.idx>=S.rev.pool.length-1){finishRev();return;}
  S.rev.idx++;S.rev.flipped=false;render();
}
function completeRevSession(type,topicId,area){
  const tid=topicId||S.rev.topicFilter||null;
  const ar=area||S.rev.aFilter||null;
  S.revSessions.push({id:'rs'+Date.now(),date:new Date().toISOString(),type,topicId:tid==='all'?null:tid,area:ar==='all'?null:ar});
  saveAll();toast('✅ Revisão registrada! Total: '+S.revSessions.length);
  updateTopStat();
  if(type==='flashcard'||type==='daily'){stopRev();}
  render();
}

/* ============================================================
   KEYBOARD SHORTCUTS
============================================================ */
document.addEventListener('keydown',ev=>{
  const gsOpen=document.getElementById('gsOverlay')?.classList.contains('open');
  // Ctrl+K / Cmd+K abre busca global (sempre tem prioridade)
  if((ev.ctrlKey||ev.metaKey)&&ev.code==='KeyK'){
    ev.preventDefault();
    if(gsOpen) closeGlobalSearch(); else openGlobalSearch();
    return;
  }
  // Quando a busca global está aberta, ela controla o teclado
  if(gsOpen){
    if(ev.key==='Escape'){ev.preventDefault();closeGlobalSearch();return;}
    if(ev.key==='ArrowDown'){ev.preventDefault();gsMove(1);return;}
    if(ev.key==='ArrowUp'){ev.preventDefault();gsMove(-1);return;}
    if(ev.key==='Enter'){ev.preventDefault();if(gsActiveIdx>=0)gsSelect(gsActiveIdx);return;}
    return;
  }
  if(S.view==='revision'&&S.rev.active){
    if(ev.code==='Space'){ev.preventDefault();flipCard();}
    if(S.rev.flipped){if(ev.code==='ArrowRight'||ev.code==='KeyL')markCard(true);if(ev.code==='ArrowLeft'||ev.code==='KeyH')markCard(false);}
  }
  if(ev.key==='Escape'){
    closeFab();
    if(S.expandedRow&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='SELECT'){
      toggleErow(S.expandedRow);
    }
  }
  // D = deletar erro expandido (só quando não está digitando em input/textarea)
  if(ev.code==='KeyD'&&S.expandedRow&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='SELECT'){
    delErr(S.expandedRow);
  }
});

/* ============================================================
   GLOBAL SEARCH (Ctrl+K)
============================================================ */
let gsActiveIdx=-1;
function openGlobalSearch(){
  const ov=document.getElementById('gsOverlay'); if(!ov) return;
  ov.classList.add('open');
  const inp=document.getElementById('gsInput');
  inp.value='';gsActiveIdx=-1;
  renderGlobalSearch('');
  setTimeout(()=>inp.focus(),10);
}
function closeGlobalSearch(){
  document.getElementById('gsOverlay')?.classList.remove('open');
}
function gsBuildResults(q){
  q=(q||'').trim().toLowerCase();
  const results=[];
  // Topics
  S.topics.forEach(t=>{
    if(!q||t.nome.toLowerCase().includes(q)){
      const a=AREAS[t.area]||AREAS.cm;
      const cnt=S.errors.filter(e=>e.topicId===t.id).length;
      results.push({type:'topic',label:t.nome,sub:`${a.icon} ${cnt} erro${cnt!==1?'s':''}`,action:()=>nav('topic',t.id)});
    }
  });
  // Errors (only if there is a query, to avoid listing 127 items by default)
  if(q){
    S.errors.forEach(e=>{
      const hay=[e.titulo,e.meuErro,e.deveSaber].filter(Boolean).join(' ').toLowerCase();
      if(hay.includes(q)){
        const t=S.topics.find(x=>x.id===e.topicId);
        const a=AREAS[e.area||t?.area||'cm']||AREAS.cm;
        results.push({type:'erro',label:e.titulo||'Sem título',sub:`${a.icon} ${t?.nome||'Geral'}`,action:()=>{nav('topic',e.topicId);setTimeout(()=>{toggleErow(e.id);document.getElementById('erow_'+e.id)?.scrollIntoView({behavior:'smooth',block:'center'});},150);}});
      }
    });
  }
  return results.slice(0,25);
}
function renderGlobalSearch(q){
  const box=document.getElementById('gsResults'); if(!box) return;
  const results=gsBuildResults(q);
  gsActiveIdx=results.length?0:-1;
  if(!results.length){box.innerHTML='<div class="gs-empty">Nenhum resultado.</div>';return;}
  box.innerHTML=results.map((r,i)=>`<div class="gs-item${i===0?' active':''}" data-idx="${i}" onclick="gsSelect(${i})">
    <span class="gs-item-tag">${r.type==='topic'?'tema':'erro'}</span>
    <span class="gs-item-title">${esc(r.label)}</span>
    <span class="gs-item-sub">${esc(r.sub)}</span>
  </div>`).join('');
  box._results=results;
}
function gsSelect(i){
  const results=document.getElementById('gsResults')?._results||[];
  const r=results[i]; if(!r) return;
  closeGlobalSearch();
  r.action();
}
function gsMove(dir){
  const box=document.getElementById('gsResults');
  const results=box?._results||[];
  if(!results.length) return;
  gsActiveIdx=(gsActiveIdx+dir+results.length)%results.length;
  box.querySelectorAll('.gs-item').forEach((el,i)=>el.classList.toggle('active',i===gsActiveIdx));
  box.querySelectorAll('.gs-item')[gsActiveIdx]?.scrollIntoView({block:'nearest'});
}

/* ============================================================
   SELECT MODE
============================================================ */
function enterSelectMode(){S.selectMode=true;S.selected=new Set();render();}
function exitSelectMode(){S.selectMode=false;S.selected=new Set();render();}
function toggleSelect(id,ev){ev.stopPropagation();if(S.selected.has(id))S.selected.delete(id);else S.selected.add(id);render();}
function selectAll(ids){ids.forEach(id=>S.selected.add(id));render();}
function delSelected(){
  if(!S.selected.size)return;
  const cnt=S.selected.size;
  if(!confirm('Apagar '+cnt+' erro(s) selecionado(s)?'))return;
  S.errors=S.errors.filter(e=>!S.selected.has(e.id));
  S.selected=new Set();S.selectMode=false;
  saveAll();toast('🗑 '+cnt+' erro(s) apagado(s)');render();renderSidebar();updateTopStat();
}
function renderSelBar(ids){
  const cnt=S.selected.size;
  const allSel=ids.length>0&&ids.every(id=>S.selected.has(id));
  return `<div class="sel-bar">
    <span class="sel-bar-lbl">${cnt>0?cnt+' selecionado(s)':'Clique nos erros para selecionar'}</span>
    <button class="btn-sel-all" onclick="selectAll([${ids.map(id=>"'"+id+"'").join(',')}])">${allSel?'✓ Todos':'Selecionar todos'}</button>
    <button class="btn-del-sel" onclick="delSelected()" ${cnt===0?'disabled':''}>🗑 Apagar selecionados</button>
    <button class="btn-cancel-sel" onclick="exitSelectMode()">Cancelar</button>
  </div>`;
}

/* ============================================================
   UTILS
============================================================ */
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function hl(s=''){
  const q=S.view==='todos'?(S.allFilter?.search||'').trim():'';
  const esced=esc(s);
  if(!q) return esced;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
  return esced.replace(re,'<mark style="background:var(--pink-light);color:inherit;border-radius:3px;padding:0 1px">$1</mark>');
}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})}catch{return '';}}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}
